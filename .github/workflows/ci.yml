name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Runs unit + integration tests; the integration tests use Testcontainers
      # (MySQL + Redis), and Docker is available on ubuntu runners out of the box.
      - name: Build & test
        working-directory: backend
        run: ./mvnw -B verify

  admin:
    name: Admin web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json
      - name: Install
        working-directory: frontend/admin
        run: npm ci
      # `npm run build` = vue-tsc typecheck (incl. the shared @shared/api types) + vite build.
      - name: Typecheck & build
        working-directory: frontend/admin
        run: npm run build

  miniprograms:
    name: Mini Programs (typecheck)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tourist-miniapp, guide-miniapp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json
      - name: Install
        working-directory: frontend/${{ matrix.app }}
        run: npm ci
      - name: Sync shared utils
        run: node tools/sync-miniapp-shared.mjs
      - name: Typecheck
        working-directory: frontend/${{ matrix.app }}
        run: npx -p typescript tsc -p tsconfig.json --noEmit
