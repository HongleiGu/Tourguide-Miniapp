# Serves the admin SPA and reverse-proxies the API to the backend.
# No domain required: server_name _ matches any host (localhost / server IP).
# To add a domain + TLS later: set `server_name yourdomain.com;` and a `listen 443 ssl;` block.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (Spring Boot). proxy_pass without a path preserves the /api prefix.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health passthrough (handy for probes).
    location = /actuator/health {
        proxy_pass http://app:8080;
    }
}
