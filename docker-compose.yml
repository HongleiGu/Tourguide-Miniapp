# Local dev infrastructure. Extended into the full stack (app + redis + nginx) in MIN-16.
# Values come from .env (Docker Compose auto-loads it); sensible dev defaults below.
services:
  mysql:
    image: mysql:8.0
    container_name: tourguide-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tourguide}
      MYSQL_USER: ${DB_USER:-tourguide}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tourguide}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tourguide-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./backend
    container_name: tourguide-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-tourguide}
      DB_USER: ${DB_USER:-tourguide}
      DB_PASSWORD: ${DB_PASSWORD:-tourguide}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me-min-32-characters}
    ports:
      - "${APP_PORT:-8080}:8080"

  nginx:
    build:
      context: ./frontend
      dockerfile: admin/Dockerfile
    container_name: tourguide-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
